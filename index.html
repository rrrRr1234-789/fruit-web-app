<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffcf5a" />
    <title>今日水果小管家</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <form name="fruit-choice" method="POST" data-netlify="true" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="fruit-choice" />
      <input name="bot-field" />
      <input name="selected_fruits" />
      <input name="recommended_fruit" />
      <input name="season" />
      <input name="month" />
      <input name="name" />
      <input name="contact" />
      <textarea name="message"></textarea>
      <input name="subject" />
    </form>

    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow" id="dateLabel">今日水果</p>
          <h1>今日水果小管家</h1>
          <p>按中国季节成熟期挑选水果，记录今天想吃什么，并推荐今日适合吃的水果。</p>
        </div>
        <div class="basket" aria-hidden="true">
          <div class="mini-fruit apple"></div>
          <div class="mini-fruit grape"></div>
          <div class="mini-fruit mango"></div>
        </div>
      </header>

      <section class="recommend-card" aria-labelledby="recommendTitle">
        <div class="pixel-frame">
          <canvas id="recommendCanvas" width="24" height="24" aria-hidden="true"></canvas>
        </div>
        <div class="recommend-copy">
          <p class="eyebrow">智能推荐</p>
          <h2 id="recommendTitle">生成中</h2>
          <p id="recommendReason"></p>
        </div>
        <button id="nextRecommend" class="round-button" type="button" aria-label="换一个推荐">↻</button>
      </section>

      <section class="picker-panel" aria-label="筛选和选择">
        <label>
          季节
          <select id="seasonFilter">
            <option value="all">全部</option>
            <option value="春">春季成熟</option>
            <option value="夏">夏季成熟</option>
            <option value="秋">秋季成熟</option>
            <option value="冬">冬季成熟</option>
          </select>
        </label>
        <label>
          口味
          <select id="tasteFilter">
            <option value="all">全部</option>
            <option value="清甜">清甜</option>
            <option value="酸甜">酸甜</option>
            <option value="香甜">香甜</option>
            <option value="多汁">多汁</option>
            <option value="酸爽">酸爽</option>
          </select>
        </label>
      </section>

      <section class="today-box" aria-labelledby="todayTitle">
        <div>
          <p class="eyebrow">今日想吃</p>
          <h2 id="todayTitle">还没有选择水果</h2>
        </div>
        <button id="clearSelection" type="button">清空</button>
      </section>

      <section class="submit-panel" aria-labelledby="submitTitle">
        <div class="section-head compact">
          <div>
            <p class="eyebrow">发送给我</p>
            <h2 id="submitTitle">提交今日水果</h2>
          </div>
        </div>
        <form
          id="fruitSubmitForm"
          name="fruit-choice"
          method="POST"
          action="/success.html"
          data-netlify="true"
          netlify
          netlify-honeypot="bot-field"
        >
          <input type="hidden" name="form-name" value="fruit-choice" />
          <input class="hidden-field" name="bot-field" autocomplete="off" tabindex="-1" />
          <input id="submitSelected" type="hidden" name="selected_fruits" />
          <input id="submitRecommended" type="hidden" name="recommended_fruit" />
          <input id="submitSeason" type="hidden" name="season" />
          <input id="submitMonth" type="hidden" name="month" />
          <input type="hidden" name="subject" value="今日水果小管家收到新的水果选择" />
          <label>
            称呼
            <input id="senderName" name="name" type="text" placeholder="例如：小林" />
          </label>
          <label>
            联系方式
            <input id="senderContact" name="contact" type="text" placeholder="微信号、邮箱或手机号，可不填" />
          </label>
          <label>
            留言
            <textarea id="senderMessage" name="message" rows="3" placeholder="想补充的口味、忌口或备注"></textarea>
          </label>
          <button class="submit-button" type="submit">提交水果选择</button>
          <p id="submitStatus" class="submit-status" role="status"></p>
        </form>
      </section>

      <section class="fruit-section" aria-labelledby="fruitListTitle">
        <div class="section-head">
          <h2 id="fruitListTitle">水果清单</h2>
          <span id="fruitCount"></span>
        </div>
        <div id="fruitGrid" class="fruit-grid" aria-live="polite"></div>
      </section>
    </main>

    <script src="./fruits.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
